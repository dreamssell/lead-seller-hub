name: Debug WAHA · E2E (Playwright)

# Execução manual reservada para reruns. A execução regular acontece dentro
# de `.github/workflows/e2e-tests.yml` (job `waha-debug-e2e`, com matriz de
# browsers). Este workflow espelha a mesma lógica de preflight/skip/matrix
# para permitir rerun seletivo por browser via workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      allow_skip:
        description: 'Pular (não falhar) quando secrets exigidas não estiverem definidas'
        required: false
        default: 'false'
      browsers:
        description: 'Lista de browsers separados por vírgula (ex.: chromium,firefox,webkit)'
        required: false
        default: 'chromium,firefox,webkit'

jobs:
  waha-debug-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    env:
      TEST_OWNER_COMPANY_ID: ${{ secrets.TEST_OWNER_COMPANY_ID }}
      TEST_OWNER_ID: ${{ secrets.TEST_OWNER_ID }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      ALLOW_SKIP: ${{ inputs.allow_skip || 'false' }}
      BROWSERS_FILTER: ${{ inputs.browsers || 'chromium,firefox,webkit' }}

    steps:
      - uses: actions/checkout@v4

      - name: Filtro por browser (workflow_dispatch)
        id: filter
        run: |
          set -eu
          if echo ",${BROWSERS_FILTER}," | grep -q ",${{ matrix.browser }},"; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Browser ${{ matrix.browser }} não incluído em BROWSERS_FILTER='${BROWSERS_FILTER}', pulando."
          fi

      - name: Preflight · secrets estruturado
        if: steps.filter.outputs.selected == 'true'
        id: preflight
        run: |
          set -eu
          MISSING=()
          for VAR in TEST_OWNER_COMPANY_ID TEST_USER_EMAIL TEST_USER_PASSWORD VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            eval "VAL=\${$VAR:-}"
            if [ -z "${VAL:-}" ]; then MISSING+=("$VAR"); fi
          done
          OPTIONAL_MISSING=()
          if [ -z "${TEST_OWNER_ID:-}" ]; then OPTIONAL_MISSING+=("TEST_OWNER_ID"); fi

          MISSING_JOIN=$(IFS=,; echo "${MISSING[*]:-}")
          OPT_JOIN=$(IFS=,; echo "${OPTIONAL_MISSING[*]:-}")

          OWNER_HASH=""
          if [ -n "${TEST_OWNER_COMPANY_ID:-}" ]; then
            OWNER_HASH=$(printf '%s' "$TEST_OWNER_COMPANY_ID" | sha256sum | cut -c1-12)
          fi

          json_arr() {
            echo "$1" | awk -F, '{out=""; for(i=1;i<=NF;i++){if($i!=""){out=out (out==""?"":",") "\"" $i "\""}} print out}'
          }
          MISSING_JSON=$(json_arr "$MISSING_JOIN")
          OPT_JSON=$(json_arr "$OPT_JOIN")

          printf '{"scope":"waha-debug-e2e.preflight","event":"checked","browser":"%s","allow_skip":"%s","missing_required":[%s],"missing_optional":[%s],"owner_hash":"%s"}\n' \
            "${{ matrix.browser }}" "${ALLOW_SKIP}" "${MISSING_JSON}" "${OPT_JSON}" "${OWNER_HASH}"

          {
            echo "### Debug WAHA · Preflight (${{ matrix.browser }})"
            echo ""
            echo "- allow_skip: \`${ALLOW_SKIP}\`"
            echo "- missing_required: \`${MISSING_JOIN:-<none>}\`"
            echo "- missing_optional: \`${OPT_JOIN:-<none>}\`"
            echo "- owner_hash: \`${OWNER_HASH:-<none>}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ ${#MISSING[@]} -gt 0 ]; then
            REASON="missing_secrets:${MISSING_JOIN}"
            if [ "${ALLOW_SKIP}" = "true" ]; then
              printf '{"scope":"waha-debug-e2e.preflight","event":"skipped","reason":"%s","browser":"%s"}\n' "$REASON" "${{ matrix.browser }}"
              echo "::warning::${REASON} — pulando (allow_skip=true)."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "skip_reason=${REASON}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            printf '{"scope":"waha-debug-e2e.preflight","event":"failed","reason":"%s","browser":"%s"}\n' "$REASON" "${{ matrix.browser }}"
            echo "::error title=Secrets ausentes::${MISSING_JOIN}. Defina em Settings → Secrets → Actions."
            exit 1
          fi

          printf '{"scope":"waha-debug-e2e.preflight","event":"running","browser":"%s","owner_hash":"%s"}\n' "${{ matrix.browser }}" "$OWNER_HASH"
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "owner_hash=${OWNER_HASH}" >> "$GITHUB_OUTPUT"

      - name: Snapshot de env (não-sensível)
        if: always() && steps.filter.outputs.selected == 'true'
        run: |
          set -eu
          mkdir -p ci-audit
          NODE_V=$(node -v 2>/dev/null || echo "n/a")
          NPM_V=$(npm -v 2>/dev/null || echo "n/a")
          PW_V=$(node -e "try{process.stdout.write(require('./package.json').devDependencies['@playwright/test']||'')}catch(e){}" 2>/dev/null || echo "")
          present() { for n in "$@"; do eval "v=\${$n:-}"; if [ -n "$v" ]; then echo "$n"; fi; done; }
          absent() { for n in "$@"; do eval "v=\${$n:-}"; if [ -z "$v" ]; then echo "$n"; fi; done; }
          PRESENT=$(present TEST_OWNER_COMPANY_ID TEST_OWNER_ID TEST_USER_EMAIL TEST_USER_PASSWORD VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY | awk 'BEGIN{ORS=","}{print "\""$0"\""}' | sed 's/,$//')
          ABSENT=$(absent TEST_OWNER_COMPANY_ID TEST_OWNER_ID TEST_USER_EMAIL TEST_USER_PASSWORD VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY | awk 'BEGIN{ORS=","}{print "\""$0"\""}' | sed 's/,$//')
          cat > "ci-audit/env-snapshot-${{ matrix.browser }}.json" <<JSON
          {
            "scope": "waha-debug-e2e.env_snapshot",
            "browser": "${{ matrix.browser }}",
            "run_id": "${GITHUB_RUN_ID}",
            "should_run": "${{ steps.preflight.outputs.should_run || 'unknown' }}",
            "owner_hash": "${{ steps.preflight.outputs.owner_hash || '' }}",
            "versions": { "node": "${NODE_V}", "npm": "${NPM_V}", "playwright_dep": "${PW_V}" },
            "env_present": [${PRESENT}],
            "env_absent": [${ABSENT}]
          }
          JSON
          cat "ci-audit/env-snapshot-${{ matrix.browser }}.json"

      - name: Setup Node.js
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.preflight.outputs.should_run == 'true'
        run: npm ci || npm install

      - name: Resolve Playwright version
        if: steps.preflight.outputs.should_run == 'true'
        id: pw
        run: |
          set -eu
          VERSION=$(node -e "const p=require('./package.json');const v=(p.devDependencies&&p.devDependencies['@playwright/test'])||(p.dependencies&&p.dependencies['@playwright/test'])||'';process.stdout.write(v.replace(/[^0-9.]/g,''))")
          if [ -z "${VERSION}" ]; then
            VERSION=$(node -p "require('playwright/package.json').version")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers (${{ matrix.browser }})
        if: steps.preflight.outputs.should_run == 'true'
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ matrix.browser }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-

      - name: Install Playwright deps (cache hit)
        if: steps.preflight.outputs.should_run == 'true' && steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Install Playwright browsers (cache miss)
        if: steps.preflight.outputs.should_run == 'true' && steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Listar testes selecionados (${{ matrix.browser }})
        if: steps.preflight.outputs.should_run == 'true'
        run: |
          set -eu
          echo "### Testes selecionados (${{ matrix.browser }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx playwright test e2e/waha-debug-panel.spec.ts --project=${{ matrix.browser }} --list | tee /tmp/pw-list.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run Debug WAHA E2E (${{ matrix.browser }})
        if: steps.preflight.outputs.should_run == 'true'
        env:
          OWNER_HASH: ${{ steps.preflight.outputs.owner_hash }}
        run: |
          printf '{"scope":"waha-debug-e2e.run","event":"start","browser":"%s","owner_hash":"%s"}\n' "${{ matrix.browser }}" "${OWNER_HASH}"
          npx playwright test e2e/waha-debug-panel.spec.ts \
            --project=${{ matrix.browser }} \
            --reporter=list,html,json \
            --trace=retain-on-failure \
            --output=test-results

      - name: Record skip reason artifact
        if: always() && steps.preflight.outputs.should_run != 'true'
        run: |
          mkdir -p playwright-report test-results
          printf '{"skipped":true,"browser":"%s","reason":"%s","event":"%s","run_id":"%s"}\n' \
            "${{ matrix.browser }}" "${{ steps.preflight.outputs.skip_reason || 'filtered_or_missing' }}" "${GITHUB_EVENT_NAME}" "${GITHUB_RUN_ID}" \
            > playwright-report/skip.json

      - name: Upload Playwright report + traces + env snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waha-debug-playwright-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
            ci-audit/
          if-no-files-found: warn
          retention-days: 14
