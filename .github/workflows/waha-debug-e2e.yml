name: Debug WAHA · E2E (Playwright)

# Roda os testes do painel Debug WAHA. O suite depende de TEST_OWNER_COMPANY_ID
# (empresa/sub-empresa do owner de teste). O job faz uma checagem preflight:
#   - Se a secret NÃO estiver definida no repo/ambiente, o job FALHA de propósito
#     com um erro claro explicando qual secret configurar e onde.
#   - Se estiver definida, roda apenas `e2e/waha-debug-panel.spec.ts`.

on:
  push:
    branches: [main, master]
    paths:
      - 'e2e/waha-debug-panel.spec.ts'
      - 'src/components/owner-dashboard/WahaInboundDebugPanel.tsx'
      - 'supabase/functions/waha-audit/**'
      - '.github/workflows/waha-debug-e2e.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'e2e/waha-debug-panel.spec.ts'
      - 'src/components/owner-dashboard/WahaInboundDebugPanel.tsx'
      - 'supabase/functions/waha-audit/**'
      - '.github/workflows/waha-debug-e2e.yml'
  workflow_dispatch:
    inputs:
      allow_skip:
        description: 'Pular (não falhar) quando TEST_OWNER_COMPANY_ID não estiver definido'
        required: false
        default: 'false'

jobs:
  waha-debug-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEST_OWNER_COMPANY_ID: ${{ secrets.TEST_OWNER_COMPANY_ID }}
      TEST_OWNER_ID: ${{ secrets.TEST_OWNER_ID }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      ALLOW_SKIP: ${{ inputs.allow_skip || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - name: Preflight · exigir TEST_OWNER_COMPANY_ID
        run: |
          set -eu
          if [ -z "${TEST_OWNER_COMPANY_ID:-}" ]; then
            echo "::group::Diagnóstico"
            echo "TEST_OWNER_COMPANY_ID ausente."
            echo "Repo/Env atuais no runner:"
            echo "  GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
            echo "  GITHUB_REF=${GITHUB_REF}"
            echo "  Secrets esperadas: TEST_OWNER_COMPANY_ID, TEST_OWNER_ID (opcional),"
            echo "                     TEST_USER_EMAIL, TEST_USER_PASSWORD,"
            echo "                     VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY"
            echo "::endgroup::"
            if [ "${ALLOW_SKIP}" = "true" ]; then
              echo "::warning::TEST_OWNER_COMPANY_ID ausente e allow_skip=true — pulando job."
              exit 0
            fi
            echo "::error title=Secret ausente::Defina TEST_OWNER_COMPANY_ID em Settings → Secrets → Actions (repo ou environment) apontando para a empresa/sub-empresa do owner de teste. Sem ela o suite Debug WAHA não pode rodar."
            exit 1
          fi
          echo "TEST_OWNER_COMPANY_ID presente (len=${#TEST_OWNER_COMPANY_ID}). Prosseguindo."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Debug WAHA E2E
        run: npx playwright test e2e/waha-debug-panel.spec.ts --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waha-debug-playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
