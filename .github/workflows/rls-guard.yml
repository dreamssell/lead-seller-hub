name: RLS Guard

on:
  pull_request:
    paths:
      - 'supabase/migrations/**.sql'
      - 'scripts/rls-guard.mjs'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**.sql'

jobs:
  rls-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run RLS Guard
        run: node scripts/rls-guard.mjs
