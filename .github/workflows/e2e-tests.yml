name: CRM E2E Tests CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run E2E Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TEST_HMAC_SECRET: ${{ secrets.TEST_HMAC_SECRET }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          echo "Starting E2E Validation for HMAC and Replay Protection..."
          npx vitest run src/__tests__/DocumentationTelemetry.test.tsx --reporter=default --reporter=junit --reporter=html --outputFile.junit=test-results.xml || {
            echo "::error::Telemetry validation failed."
            echo "DEBUG LOGS:"
            echo "X-Correlation-ID tracing enabled for failures."
            exit 1
          }

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-artifacts
          path: |
            test-results.xml
            html/
            screenshots/
          retention-days: 7

  waha-debug-e2e:
    name: Debug WAHA · E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    env:
      TEST_OWNER_COMPANY_ID: ${{ secrets.TEST_OWNER_COMPANY_ID }}
      TEST_OWNER_ID: ${{ secrets.TEST_OWNER_ID }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # PRs vindos de forks não têm acesso a secrets do repositório.
      IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Preflight · secrets + contexto do PR (estruturado)
        id: preflight
        run: |
          set -eu
          # Detecta secrets ausentes de forma auditável (nomes apenas, nunca valores).
          MISSING=()
          for VAR in TEST_OWNER_COMPANY_ID TEST_USER_EMAIL TEST_USER_PASSWORD VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            eval "VAL=\${$VAR:-}"
            if [ -z "${VAL:-}" ]; then MISSING+=("$VAR"); fi
          done
          OPTIONAL_MISSING=()
          if [ -z "${TEST_OWNER_ID:-}" ]; then OPTIONAL_MISSING+=("TEST_OWNER_ID"); fi

          MISSING_JOIN=$(IFS=,; echo "${MISSING[*]:-}")
          OPT_JOIN=$(IFS=,; echo "${OPTIONAL_MISSING[*]:-}")

          # Hash curto do owner_company_id para correlação em logs sem vazar o UUID.
          OWNER_HASH=""
          if [ -n "${TEST_OWNER_COMPANY_ID:-}" ]; then
            OWNER_HASH=$(printf '%s' "$TEST_OWNER_COMPANY_ID" | sha256sum | cut -c1-12)
          fi

          json_arr() {
            echo "$1" | awk -F, '{out=""; for(i=1;i<=NF;i++){if($i!=""){out=out (out==""?"":",") "\"" $i "\""}} print out}'
          }
          MISSING_JSON=$(json_arr "$MISSING_JOIN")
          OPT_JSON=$(json_arr "$OPT_JOIN")

          # Log estruturado (JSON em uma linha) — parseável por observabilidade de CI.
          printf '{"scope":"waha-debug-e2e.preflight","event":"checked","repo":"%s","ref":"%s","run_id":"%s","run_attempt":"%s","event_name":"%s","is_fork_pr":%s,"missing_required":[%s],"missing_optional":[%s],"owner_hash":"%s"}\n' \
            "${GITHUB_REPOSITORY}" "${GITHUB_REF}" "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" \
            "${GITHUB_EVENT_NAME}" "${IS_FORK_PR}" "${MISSING_JSON}" "${OPT_JSON}" "${OWNER_HASH}"

          {
            echo "### Debug WAHA · Preflight"
            echo ""
            echo "- event: \`${GITHUB_EVENT_NAME}\`"
            echo "- repo: \`${GITHUB_REPOSITORY}\`"
            echo "- ref: \`${GITHUB_REF}\`"
            echo "- is_fork_pr: \`${IS_FORK_PR}\`"
            echo "- missing_required: \`${MISSING_JOIN:-<none>}\`"
            echo "- missing_optional: \`${OPT_JOIN:-<none>}\`"
            echo "- owner_hash: \`${OWNER_HASH:-<none>}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ ${#MISSING[@]} -gt 0 ]; then
            REASON="missing_secrets:${MISSING_JOIN}"
            if [ "${IS_FORK_PR}" = "true" ]; then
              printf '{"scope":"waha-debug-e2e.preflight","event":"skipped","reason":"%s","is_fork_pr":true}\n' "$REASON"
              echo "::warning title=Debug WAHA pulado (fork PR)::Secrets ausentes em PR de fork: ${MISSING_JOIN}. Suite pulado sem falhar o pipeline."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "skip_reason=${REASON}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            printf '{"scope":"waha-debug-e2e.preflight","event":"failed","reason":"%s"}\n' "$REASON"
            echo "::error title=Secrets ausentes::${MISSING_JOIN}. Defina em Settings → Secrets → Actions."
            exit 1
          fi

          printf '{"scope":"waha-debug-e2e.preflight","event":"running","owner_hash":"%s"}\n' "$OWNER_HASH"
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "owner_hash=${OWNER_HASH}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.preflight.outputs.should_run == 'true'
        run: npm ci || npm install

      - name: Resolve Playwright version
        if: steps.preflight.outputs.should_run == 'true'
        id: pw
        run: |
          set -eu
          VERSION=$(node -e "const p=require('./package.json');const v=(p.devDependencies&&p.devDependencies['@playwright/test'])||(p.dependencies&&p.dependencies['@playwright/test'])||'';process.stdout.write(v.replace(/[^0-9.]/g,''))")
          if [ -z "${VERSION}" ]; then
            VERSION=$(node -p "require('playwright/package.json').version")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Playwright version resolved: ${VERSION}"

      - name: Cache Playwright browsers
        if: steps.preflight.outputs.should_run == 'true'
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-chromium
          restore-keys: |
            playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-

      - name: Install Playwright system deps (cache hit)
        if: steps.preflight.outputs.should_run == 'true' && steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers (cache miss)
        if: steps.preflight.outputs.should_run == 'true' && steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Debug WAHA E2E
        if: steps.preflight.outputs.should_run == 'true'
        env:
          OWNER_HASH: ${{ steps.preflight.outputs.owner_hash }}
        run: |
          printf '{"scope":"waha-debug-e2e.run","event":"start","owner_hash":"%s"}\n' "${OWNER_HASH}"
          npx playwright test e2e/waha-debug-panel.spec.ts \
            --reporter=list,html,json \
            --trace=retain-on-failure \
            --output=test-results

      - name: Record skip reason artifact
        if: always() && steps.preflight.outputs.should_run != 'true'
        run: |
          mkdir -p playwright-report test-results
          printf '{"skipped":true,"reason":"%s","is_fork_pr":"%s","event":"%s","run_id":"%s"}\n' \
            "${{ steps.preflight.outputs.skip_reason }}" "${IS_FORK_PR}" "${GITHUB_EVENT_NAME}" "${GITHUB_RUN_ID}" \
            > playwright-report/skip.json

      - name: Upload Playwright report + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waha-debug-playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14
