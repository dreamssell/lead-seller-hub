name: CRM E2E Tests CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run E2E Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TEST_HMAC_SECRET: ${{ secrets.TEST_HMAC_SECRET }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          echo "Starting E2E Validation for HMAC and Replay Protection..."
          # Usando vitest com reporter junit e html para artefatos
          npx vitest run src/__tests__/DocumentationTelemetry.test.tsx --reporter=default --reporter=junit --reporter=html --outputFile.junit=test-results.xml || {
            echo "::error::Telemetry validation failed."
            echo "DEBUG LOGS:"
            echo "X-Correlation-ID tracing enabled for failures."
            exit 1
          }
          
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-artifacts
          path: |
            test-results.xml
            html/
            screenshots/
          retention-days: 7
