name: CRM E2E Tests CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run E2E Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TEST_HMAC_SECRET: ${{ secrets.TEST_HMAC_SECRET }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          echo "Starting E2E Validation for HMAC and Replay Protection..."
          npx vitest run src/__tests__/DocumentationTelemetry.test.tsx --reporter=default --reporter=junit --reporter=html --outputFile.junit=test-results.xml || {
            echo "::error::Telemetry validation failed."
            exit 1
          }

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-artifacts
          path: |
            test-results.xml
            html/
            screenshots/
          retention-days: 7

  waha-debug-e2e:
    name: Debug WAHA · E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    env:
      TEST_OWNER_COMPANY_ID: ${{ secrets.TEST_OWNER_COMPANY_ID }}
      TEST_OWNER_ID: ${{ secrets.TEST_OWNER_ID }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Preflight · secrets + contexto do PR (estruturado)
        id: preflight
        run: |
          set -eu
          MISSING=()
          for VAR in TEST_OWNER_COMPANY_ID TEST_USER_EMAIL TEST_USER_PASSWORD VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            eval "VAL=\${$VAR:-}"
            if [ -z "${VAL:-}" ]; then MISSING+=("$VAR"); fi
          done
          OPTIONAL_MISSING=()
          if [ -z "${TEST_OWNER_ID:-}" ]; then OPTIONAL_MISSING+=("TEST_OWNER_ID"); fi

          MISSING_JOIN=$(IFS=,; echo "${MISSING[*]:-}")
          OPT_JOIN=$(IFS=,; echo "${OPTIONAL_MISSING[*]:-}")

          OWNER_HASH=""
          if [ -n "${TEST_OWNER_COMPANY_ID:-}" ]; then
            OWNER_HASH=$(printf '%s' "$TEST_OWNER_COMPANY_ID" | sha256sum | cut -c1-12)
          fi

          json_arr() {
            echo "$1" | awk -F, '{out=""; for(i=1;i<=NF;i++){if($i!=""){out=out (out==""?"":",") "\"" $i "\""}} print out}'
          }
          MISSING_JSON=$(json_arr "$MISSING_JOIN")
          OPT_JSON=$(json_arr "$OPT_JOIN")

          printf '{"scope":"waha-debug-e2e.preflight","event":"checked","browser":"%s","repo":"%s","ref":"%s","run_id":"%s","run_attempt":"%s","event_name":"%s","is_fork_pr":%s,"missing_required":[%s],"missing_optional":[%s],"owner_hash":"%s"}\n' \
            "${{ matrix.browser }}" "${GITHUB_REPOSITORY}" "${GITHUB_REF}" "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" \
            "${GITHUB_EVENT_NAME}" "${IS_FORK_PR}" "${MISSING_JSON}" "${OPT_JSON}" "${OWNER_HASH}"

          {
            echo "### Debug WAHA · Preflight (${{ matrix.browser }})"
            echo ""
            echo "- browser: \`${{ matrix.browser }}\`"
            echo "- event: \`${GITHUB_EVENT_NAME}\`"
            echo "- is_fork_pr: \`${IS_FORK_PR}\`"
            echo "- missing_required: \`${MISSING_JOIN:-<none>}\`"
            echo "- missing_optional: \`${OPT_JOIN:-<none>}\`"
            echo "- owner_hash: \`${OWNER_HASH:-<none>}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ ${#MISSING[@]} -gt 0 ]; then
            REASON="missing_secrets:${MISSING_JOIN}"
            if [ "${IS_FORK_PR}" = "true" ]; then
              printf '{"scope":"waha-debug-e2e.preflight","event":"skipped","reason":"%s","browser":"%s","is_fork_pr":true}\n' "$REASON" "${{ matrix.browser }}"
              echo "::warning title=Debug WAHA (${{ matrix.browser }}) pulado (fork PR)::Secrets ausentes: ${MISSING_JOIN}. Suite pulado sem falhar o pipeline."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "skip_reason=${REASON}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            printf '{"scope":"waha-debug-e2e.preflight","event":"failed","reason":"%s","browser":"%s"}\n' "$REASON" "${{ matrix.browser }}"
            echo "::error title=Secrets ausentes::${MISSING_JOIN}. Defina em Settings → Secrets → Actions."
            exit 1
          fi

          printf '{"scope":"waha-debug-e2e.preflight","event":"running","browser":"%s","owner_hash":"%s"}\n' "${{ matrix.browser }}" "$OWNER_HASH"
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "owner_hash=${OWNER_HASH}" >> "$GITHUB_OUTPUT"

      - name: Snapshot de env (não-sensível) para auditoria
        if: always()
        run: |
          set -eu
          mkdir -p ci-audit
          # Nunca dumpa valores; apenas nomes presentes/ausentes + versões-chave.
          NODE_V=$(node -v 2>/dev/null || echo "n/a")
          NPM_V=$(npm -v 2>/dev/null || echo "n/a")
          PW_V=$(node -e "try{process.stdout.write(require('./package.json').devDependencies['@playwright/test']||'')}catch(e){}" 2>/dev/null || echo "")
          present() { for n in "$@"; do eval "v=\${$n:-}"; if [ -n "$v" ]; then echo "$n"; fi; done; }
          absent() { for n in "$@"; do eval "v=\${$n:-}"; if [ -z "$v" ]; then echo "$n"; fi; done; }
          PRESENT=$(present TEST_OWNER_COMPANY_ID TEST_OWNER_ID TEST_USER_EMAIL TEST_USER_PASSWORD VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY | awk 'BEGIN{ORS=","}{print "\""$0"\""}' | sed 's/,$//')
          ABSENT=$(absent TEST_OWNER_COMPANY_ID TEST_OWNER_ID TEST_USER_EMAIL TEST_USER_PASSWORD VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY | awk 'BEGIN{ORS=","}{print "\""$0"\""}' | sed 's/,$//')
          cat > "ci-audit/env-snapshot-${{ matrix.browser }}.json" <<JSON
          {
            "scope": "waha-debug-e2e.env_snapshot",
            "browser": "${{ matrix.browser }}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "event_name": "${GITHUB_EVENT_NAME}",
            "should_run": "${{ steps.preflight.outputs.should_run || 'unknown' }}",
            "owner_hash": "${{ steps.preflight.outputs.owner_hash || '' }}",
            "versions": { "node": "${NODE_V}", "npm": "${NPM_V}", "playwright_dep": "${PW_V}" },
            "env_present": [${PRESENT}],
            "env_absent": [${ABSENT}]
          }
          JSON
          echo "Snapshot escrito em ci-audit/env-snapshot-${{ matrix.browser }}.json"
          cat "ci-audit/env-snapshot-${{ matrix.browser }}.json"

      - name: Setup Node.js
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.preflight.outputs.should_run == 'true'
        run: npm ci || npm install

      - name: Resolve Playwright version
        if: steps.preflight.outputs.should_run == 'true'
        id: pw
        run: |
          set -eu
          VERSION=$(node -e "const p=require('./package.json');const v=(p.devDependencies&&p.devDependencies['@playwright/test'])||(p.dependencies&&p.dependencies['@playwright/test'])||'';process.stdout.write(v.replace(/[^0-9.]/g,''))")
          if [ -z "${VERSION}" ]; then
            VERSION=$(node -p "require('playwright/package.json').version")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Playwright version resolved: ${VERSION}"

      - name: Cache Playwright browsers (${{ matrix.browser }})
        if: steps.preflight.outputs.should_run == 'true'
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ matrix.browser }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-

      - name: Install Playwright deps (cache hit)
        if: steps.preflight.outputs.should_run == 'true' && steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Install Playwright browsers (cache miss)
        if: steps.preflight.outputs.should_run == 'true' && steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Listar testes a executar (dry-run + filtragem)
        if: steps.preflight.outputs.should_run == 'true'
        run: |
          set -eu
          echo "### Testes selecionados (${{ matrix.browser }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx playwright test e2e/waha-debug-panel.spec.ts --project=${{ matrix.browser }} --list | tee /tmp/pw-list.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          COUNT=$(grep -cE '^\s*›' /tmp/pw-list.txt || echo 0)
          printf '{"scope":"waha-debug-e2e.list","browser":"%s","selected_tests":%s}\n' "${{ matrix.browser }}" "${COUNT}"

      - name: Run Debug WAHA E2E (${{ matrix.browser }})
        if: steps.preflight.outputs.should_run == 'true'
        env:
          OWNER_HASH: ${{ steps.preflight.outputs.owner_hash }}
        run: |
          printf '{"scope":"waha-debug-e2e.run","event":"start","browser":"%s","owner_hash":"%s"}\n' "${{ matrix.browser }}" "${OWNER_HASH}"
          npx playwright test e2e/waha-debug-panel.spec.ts \
            --project=${{ matrix.browser }} \
            --reporter=list,html,json \
            --trace=retain-on-failure \
            --output=test-results

      - name: Segregar artefatos por browser (rename + organizar)
        if: always()
        run: |
          set -eu
          BR="${{ matrix.browser }}"
          OUT="artifacts/${BR}"
          mkdir -p "${OUT}/playwright-report" "${OUT}/traces" "${OUT}/screenshots" "${OUT}/videos" "${OUT}/ci-audit"
          # HTML report + JSON
          if [ -d playwright-report ]; then cp -R playwright-report/. "${OUT}/playwright-report/" || true; fi
          # test-results contém traces (.zip), screenshots (.png) e videos (.webm)
          if [ -d test-results ]; then
            find test-results -type f -name "*.zip" -exec cp {} "${OUT}/traces/" \; || true
            find test-results -type f -name "*.png" -exec cp {} "${OUT}/screenshots/" \; || true
            find test-results -type f \( -name "*.webm" -o -name "*.mp4" \) -exec cp {} "${OUT}/videos/" \; || true
          fi
          # Env snapshot já é nomeado por browser
          if [ -d ci-audit ]; then cp -R ci-audit/. "${OUT}/ci-audit/" || true; fi
          # Manifest do bundle para facilitar comparação lado-a-lado.
          {
            echo "{"
            echo "  \"browser\": \"${BR}\","
            echo "  \"run_id\": \"${GITHUB_RUN_ID}\","
            echo "  \"run_attempt\": \"${GITHUB_RUN_ATTEMPT}\","
            echo "  \"should_run\": \"${{ steps.preflight.outputs.should_run || 'unknown' }}\","
            echo "  \"traces\": $(ls -1 ${OUT}/traces 2>/dev/null | wc -l),"
            echo "  \"screenshots\": $(ls -1 ${OUT}/screenshots 2>/dev/null | wc -l),"
            echo "  \"videos\": $(ls -1 ${OUT}/videos 2>/dev/null | wc -l)"
            echo "}"
          } > "${OUT}/manifest.json"
          # Skip reason (só quando o job foi pulado por preflight).
          if [ "${{ steps.preflight.outputs.should_run || 'unknown' }}" != "true" ]; then
            printf '{"skipped":true,"browser":"%s","reason":"%s","is_fork_pr":"%s","event":"%s","run_id":"%s"}\n' \
              "${BR}" "${{ steps.preflight.outputs.skip_reason || 'unknown' }}" "${IS_FORK_PR}" "${GITHUB_EVENT_NAME}" "${GITHUB_RUN_ID}" \
              > "${OUT}/skip.json"
          fi
          ls -la "${OUT}" || true

      - name: Upload artefatos separados por browser
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waha-debug-${{ matrix.browser }}
          path: artifacts/${{ matrix.browser }}/
          if-no-files-found: warn
          retention-days: 14

  mobile-responsive:
    name: Mobile · responsividade (${{ matrix.device.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    strategy:
      fail-fast: false
      matrix:
        device:
          - { project: mobile-iphone, install: webkit }
          - { project: mobile-android, install: chromium }
    env:
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - name: Install deps
        run: npm ci || npm install
      - name: Resolve Playwright version
        id: pw
        run: |
          set -eu
          V=$(node -p "require('playwright/package.json').version")
          echo "version=${V}" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers (${{ matrix.device.install }})
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ matrix.device.install }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-
      - name: Install Playwright deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.device.install }}
      - name: Install Playwright browsers (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.device.install }}
      - name: Snapshot de env (não-sensível) para auditoria
        if: always()
        run: |
          set -eu
          PJ="${{ matrix.device.project }}"
          ENGINE="${{ matrix.device.install }}"
          mkdir -p ci-audit
          NODE_V=$(node -v 2>/dev/null || echo "n/a")
          NPM_V=$(npm -v 2>/dev/null || echo "n/a")
          PW_V=$(node -e "try{process.stdout.write(require('./package.json').devDependencies['@playwright/test']||'')}catch(e){}" 2>/dev/null || echo "")
          present() { for n in "$@"; do eval "v=\${$n:-}"; if [ -n "$v" ]; then echo "$n"; fi; done; }
          absent() { for n in "$@"; do eval "v=\${$n:-}"; if [ -z "$v" ]; then echo "$n"; fi; done; }
          PRESENT=$(present TEST_USER_EMAIL TEST_USER_PASSWORD VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY | awk 'BEGIN{ORS=","}{print "\""$0"\""}' | sed 's/,$//')
          ABSENT=$(absent TEST_USER_EMAIL TEST_USER_PASSWORD VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY | awk 'BEGIN{ORS=","}{print "\""$0"\""}' | sed 's/,$//')
          cat > "ci-audit/env-snapshot-${PJ}.json" <<JSON
          {
            "scope": "mobile-responsive.env_snapshot",
            "project": "${PJ}",
            "engine": "${ENGINE}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "event_name": "${GITHUB_EVENT_NAME}",
            "ref": "${GITHUB_REF}",
            "versions": { "node": "${NODE_V}", "npm": "${NPM_V}", "playwright_dep": "${PW_V}" },
            "env_present": [${PRESENT}],
            "env_absent": [${ABSENT}]
          }
          JSON
          cat "ci-audit/env-snapshot-${PJ}.json"
      - name: Start Vite preview
        run: |
          nohup npm run dev >/tmp/vite.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sSf http://localhost:8080 >/dev/null 2>&1; then echo "vite up"; break; fi
            sleep 1
          done
      - name: List selecionados (${{ matrix.device.project }})
        run: |
          echo "### Selecionados (${{ matrix.device.project }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx playwright test e2e/mobile-responsive.spec.ts --project=${{ matrix.device.project }} --list >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Run mobile sweep
        run: |
          npx playwright test e2e/mobile-responsive.spec.ts \
            --project=${{ matrix.device.project }} \
            --reporter=list,html,json \
            --output=test-results-mobile
      - name: Organizar artefatos mobile
        if: always()
        run: |
          set -eu
          PJ="${{ matrix.device.project }}"
          ENGINE="${{ matrix.device.install }}"
          OUT="upload/${PJ}"
          mkdir -p "${OUT}/playwright-report" "${OUT}/screenshots" "${OUT}/traces" "${OUT}/videos" "${OUT}/ci-audit"
          [ -d playwright-report ] && cp -R playwright-report/. "${OUT}/playwright-report/" || true
          [ -d artifacts/mobile/${PJ} ] && cp -R artifacts/mobile/${PJ}/. "${OUT}/screenshots/" || true
          if [ -d test-results-mobile ]; then
            find test-results-mobile -type f -name "*.zip" -exec cp {} "${OUT}/traces/" \; || true
            find test-results-mobile -type f -name "*.png" -exec cp {} "${OUT}/screenshots/" \; || true
            find test-results-mobile -type f \( -name "*.webm" -o -name "*.mp4" \) -exec cp {} "${OUT}/videos/" \; || true
          fi
          [ -d ci-audit ] && cp -R ci-audit/. "${OUT}/ci-audit/" || true
          {
            echo "{"
            echo "  \"scope\": \"mobile-responsive.manifest\","
            echo "  \"project\": \"${PJ}\","
            echo "  \"engine\": \"${ENGINE}\","
            echo "  \"run_id\": \"${GITHUB_RUN_ID}\","
            echo "  \"run_attempt\": \"${GITHUB_RUN_ATTEMPT}\","
            echo "  \"event_name\": \"${GITHUB_EVENT_NAME}\","
            echo "  \"ref\": \"${GITHUB_REF}\","
            echo "  \"traces\": $(ls -1 ${OUT}/traces 2>/dev/null | wc -l),"
            echo "  \"screenshots\": $(ls -1 ${OUT}/screenshots 2>/dev/null | wc -l),"
            echo "  \"videos\": $(ls -1 ${OUT}/videos 2>/dev/null | wc -l),"
            echo "  \"has_env_snapshot\": $([ -f ${OUT}/ci-audit/env-snapshot-${PJ}.json ] && echo true || echo false),"
            echo "  \"has_playwright_report\": $([ -d ${OUT}/playwright-report ] && [ -n \"$(ls -A ${OUT}/playwright-report 2>/dev/null)\" ] && echo true || echo false)"
            echo "}"
          } > "${OUT}/manifest.json"
          ls -la "${OUT}" || true
      - name: Upload artefatos mobile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-${{ matrix.device.project }}
          path: upload/${{ matrix.device.project }}/
          if-no-files-found: warn
          retention-days: 14


